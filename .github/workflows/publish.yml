name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PGROLL_TEST_POSTGRES_IMAGE: postgres:17-alpine
      DOTNET_CLI_HOME: ${{ github.workspace }}/.dotnet
      PACKAGE_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore PgRoll.slnx

      - name: Normalize package version from tag
        run: echo "PACKAGE_VERSION=${PACKAGE_VERSION#v}" >> $GITHUB_ENV

      - name: Build
        run: |
          dotnet build PgRoll.slnx --no-restore --configuration Release \
            /p:Version=$PACKAGE_VERSION \
            /p:InformationalVersion=$PACKAGE_VERSION

      - name: Test
        run: dotnet test PgRoll.slnx --no-build --configuration Release --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/PgRoll.Core/ --no-build --configuration Release --output ./nupkgs \
            /p:Version=$PACKAGE_VERSION \
            /p:InformationalVersion=$PACKAGE_VERSION
          dotnet pack src/PgRoll.PostgreSQL/ --no-build --configuration Release --output ./nupkgs \
            /p:Version=$PACKAGE_VERSION \
            /p:InformationalVersion=$PACKAGE_VERSION
          dotnet pack src/PgRoll.EntityFrameworkCore/ --no-build --configuration Release --output ./nupkgs \
            /p:Version=$PACKAGE_VERSION \
            /p:InformationalVersion=$PACKAGE_VERSION
          dotnet pack src/PgRoll.Cli/ --no-build --configuration Release --output ./nupkgs \
            /p:Version=$PACKAGE_VERSION \
            /p:InformationalVersion=$PACKAGE_VERSION

      - name: Smoke test packaged CLI
        run: |
          mkdir -p ./.tools
          dotnet tool install --tool-path ./.tools --add-source ./nupkgs --ignore-failed-sources PgRoll.Cli --version $PACKAGE_VERSION
          ./.tools/pgroll-net --help
          ./.tools/pgroll-net validate --help
          ./.tools/pgroll-net efcore convert --help

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
