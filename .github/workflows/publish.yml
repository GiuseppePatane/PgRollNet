name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (Core)
        run: dotnet test tests/PgRoll.Core.Tests/ --no-build --configuration Release --verbosity normal

      - name: Test (EF Core)
        run: dotnet test tests/PgRoll.EntityFrameworkCore.Tests/ --no-build --configuration Release --verbosity normal

      - name: Test (PostgreSQL integration)
        run: dotnet test tests/PgRoll.PostgreSQL.Tests/ --no-build --configuration Release --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/PgRoll.Core/ --no-build --configuration Release --output ./nupkgs
          dotnet pack src/PgRoll.PostgreSQL/ --no-build --configuration Release --output ./nupkgs
          dotnet pack src/PgRoll.EntityFrameworkCore/ --no-build --configuration Release --output ./nupkgs
          dotnet pack src/PgRoll.Cli/ --no-build --configuration Release --output ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
